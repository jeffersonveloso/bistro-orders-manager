name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_image:
        description: Publish Docker image after build
        type: boolean
        required: true
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build Next.js
        run: npm run build

      - name: Upload standalone build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-standalone-build
          path: |
            .next/standalone
            .next/static
            public
          if-no-files-found: error

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: bistro-orders-manager:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-image:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_image)
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check Docker Hub secrets
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub secrets not configured. Skipping image publish."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set image metadata
        id: meta
        if: steps.dockerhub.outputs.enabled == 'true'
        env:
          DOCKERHUB_ORG: ${{ vars.DOCKERHUB_ORG }}
          DOCKERHUB_IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME }}
        run: |
          ORG="${DOCKERHUB_ORG:-${GITHUB_REPOSITORY_OWNER}}"
          REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
          IMAGE_NAME="${DOCKERHUB_IMAGE_NAME:-$REPOSITORY_NAME}"
          ORG="$(printf '%s' "$ORG" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="$(printf '%s' "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          IMAGE="${ORG}/${IMAGE_NAME}"
          BRANCH="$(printf '%s' "$GITHUB_REF_NAME" | tr '/[:upper:]' '-[:lower:]')"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          {
            echo 'tags<<EOF'
            if [ "$BRANCH" = "main" ]; then
              echo "${IMAGE}:latest"
            fi
            echo "${IMAGE}:${BRANCH}-latest"
            echo "${IMAGE}:${BRANCH}-${SHORT_SHA}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        if: steps.dockerhub.outputs.enabled == 'true'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        if: steps.dockerhub.outputs.enabled == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish Docker image
        uses: docker/build-push-action@v6
        if: steps.dockerhub.outputs.enabled == 'true'
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

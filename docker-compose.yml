services:
  app:
    image: ${BISTRO_IMAGE:?Set BISTRO_IMAGE in the selected env file}
    container_name: ${BISTRO_CONTAINER_NAME:-bistro-orders-manager}
    restart: unless-stopped
    ports:
      - "${BISTRO_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      ALLOWED_DEV_ORIGINS: ${ALLOWED_DEV_ORIGINS:-}
      BISTRO_ACCESS_SESSION_SECRET: ${BISTRO_ACCESS_SESSION_SECRET:?Set BISTRO_ACCESS_SESSION_SECRET}
      BISTRO_ACCESS_PIN_KITCHEN_1: ${BISTRO_ACCESS_PIN_KITCHEN_1:?Set BISTRO_ACCESS_PIN_KITCHEN_1}
      BISTRO_ACCESS_PIN_KITCHEN_2: ${BISTRO_ACCESS_PIN_KITCHEN_2:?Set BISTRO_ACCESS_PIN_KITCHEN_2}
      BISTRO_ACCESS_PIN_SALON: ${BISTRO_ACCESS_PIN_SALON:?Set BISTRO_ACCESS_PIN_SALON}
      BISTRO_ACCESS_SESSION_TTL_HOURS: ${BISTRO_ACCESS_SESSION_TTL_HOURS:-16}
      BISTRO_ORDER_SYNC_PROVIDER_MODE: ${BISTRO_ORDER_SYNC_PROVIDER_MODE:-mock}
      BISTRO_DATABASE_PATH: ${BISTRO_DATABASE_PATH:-/app/data/bistro-production.sqlite}
      BISTRO_ANOTA_AI_TOKEN: ${BISTRO_ANOTA_AI_TOKEN:-}
      BISTRO_ANOTA_WEBHOOK_SECRET: ${BISTRO_ANOTA_WEBHOOK_SECRET:-}
      BISTRO_INTERNAL_SYNC_SECRET: ${BISTRO_INTERNAL_SYNC_SECRET:-}
      BISTRO_ANOTA_AI_BASE_URL: ${BISTRO_ANOTA_AI_BASE_URL:-https://api-parceiros.anota.ai/partnerauth}
      BISTRO_ANOTA_AI_CATALOG_BASE_URL: ${BISTRO_ANOTA_AI_CATALOG_BASE_URL:-https://api-menu.anota.ai/partnerauth}
      BISTRO_ANOTA_AI_CATALOG_LIST_PATH: ${BISTRO_ANOTA_AI_CATALOG_LIST_PATH:-v2/nm-category/rest/simple-item/export/v2}
      BISTRO_PROVIDER_SYNC_READ_REFRESH_INTERVAL_MS: ${BISTRO_PROVIDER_SYNC_READ_REFRESH_INTERVAL_MS:-}
      BISTRO_PROVIDER_SYNC_READ_REFRESH_OVERLAP_MS: ${BISTRO_PROVIDER_SYNC_READ_REFRESH_OVERLAP_MS:-}
    volumes:
      - type: volume
        source: bistro_data
        target: /app/data

volumes:
  bistro_data:
    name: ${BISTRO_DATA_VOLUME:-bistro-orders-manager-data}

[defaults]
ide = "codex"
model = "gpt-5.4"
reasoning_effort = "xhigh"
access_mode = "full"
timeout = "10m"
tail_lines = 0
add_dirs = ["../shared"]
auto_commit = true
max_retries = 0
retry_backoff_multiplier = 1.5

[tasks.run]
include_completed = false

[exec]
output_format = "text"

[tasks]
types = ["frontend", "backend", "docs", "test", "infra", "refactor", "chore", "bugfix"]

[fix_reviews]
concurrent = 2
batch_size = 3
include_resolved = false

[fetch_reviews]
provider = "coderabbit"
